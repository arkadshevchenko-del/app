<html>
  <head>
    <title>salam</title>
  </head>
  <body>
    <input type="text" id="name" placeholder="user">
    <input type="text" id="input">
    <div id="chat">
      <h1>загрузка чата...</h1>
    </div>

    <script>
      document.addEventListener( keydown,(event) => {
        if (event.key === 'Enter') {
          fetch('/addToChatMessege', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({name : document.getElementById("name").value, message : document.getElementById("input").value}) 
          })
        } 
      })
      function getChat () {
        let chat = fetch("getChat").then(document.getElementById("chat").innerHTML = "")
        let realChat = chat.json()
        for(let i = 0;i < realChat.length;i++){
          chat = realChat[i].name + " : " + realChat[i].message
          document.getElementById("chat").insertAdjacentHTML('beforeend', chat);
        }
      }
      getChat()
      let interval = setInterval(getChat,1000)
    </script>
  </body>
</html>
