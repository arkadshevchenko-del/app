<html>
  <head>
    <title>salam</title>
  </head>
  <body>
    <input type="text" id="name" placeholder="user">
    <input type="text" id="input">
    <div id="chat">
      <h1>загрузка чата...</h1>
    </div>

    <script>
      document.addEventListener( "keydown",(event) => {
        if (event.key === 'Enter') {
          fetch('/addToChatMessege', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({name : document.getElementById("name").value, message : document.getElementById("input").value}) 
          })
        } 
      })
      function getChat () {
        fetch("/getChat")
          .then(document.getElementById("chat").innerHTML = "")
          .then((res) => { 
            let chat = res.json()
          })
        for(let i = chat.length ;i < 0;i--){
          let a = chat[i].name + " : " + chat[i].message
          document.getElementById("chat").insertAdjacentHTML('beforeend', chat);
        }
      }
      getChat()
      let interval = setInterval(getChat,1000)
    </script>
  </body>
</html>
